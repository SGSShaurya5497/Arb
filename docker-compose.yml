services:

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: arb
      POSTGRES_USER: arb_user
      POSTGRES_PASSWORD: arb_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    ports:
      - "8000:8000"

  collector:
    build: ./backend

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"

volumes:
  postgres_data: