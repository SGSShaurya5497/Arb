services:

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: arb
      POSTGRES_USER: arb_user
      POSTGRES_PASSWORD: arb_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=postgresql://arb_user:arb_password@postgres:5432/arb
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      # JWT — swap this with a real secret in staging/prod
      # Generate with: openssl rand -hex 32
      - JWT_SECRET_KEY=dev_secret_change_in_production
      - JWT_ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
    depends_on:
      - postgres
      - redis

  # Celery Worker — executes tasks that Beat schedules.
  # -A collector.celery_app  → load the Celery app object from this module
  # worker                   → run in worker mode (consumes from queue)
  # --loglevel=info          → print task start/success/failure to stdout
  celery_worker:
    build: ./backend
    command: celery -A collector.celery_app worker --loglevel=info
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=postgresql://arb_user:arb_password@postgres:5432/arb
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - postgres
      - redis

  # Celery Beat — the periodic task scheduler.
  # Beat does NOT run tasks — it only publishes task messages to Redis every
  # N seconds. The worker container picks those up and executes them.
  # --scheduler django_celery_beat... is NOT used here — we use the default
  # in-memory scheduler since our schedule is defined in celery_app.py.
  celery_beat:
    build: ./backend
    command: celery -A collector.celery_app beat --loglevel=info
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=postgresql://arb_user:arb_password@postgres:5432/arb
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - postgres
      - redis

  # Frontend — Vite dev server with hot-module-reload.
  # src/ is bind-mounted so changes on the host are reflected instantly.
  # node_modules lives inside the image (not mounted) to avoid host/container
  # platform conflicts on Windows/macOS.
  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      # Bind-mount source tree for hot-reload (excludes node_modules via the
      # anonymous volume trick below)
      - ./frontend:/app
      # Anonymous volume keeps the container's node_modules intact even though
      # the parent directory is mounted from the host
      - /app/node_modules
    environment:
      # Tells vite.config.ts to proxy API/WS calls to the backend service
      - BACKEND_HOST=backend
    depends_on:
      - backend

volumes:
  postgres_data: